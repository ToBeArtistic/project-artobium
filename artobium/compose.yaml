
services:
  #Webserver
  server:
    container_name: artobium_web
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    ports:
      - 3000:8080
    depends_on:
      db:
        condition: service_healthy
  #Proxy
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - 80:80
      - 443:443 
    restart: unless-stopped
    volumes:
      - ./proxy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
  #DB
  db:
    image: postgres:18
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret #This is an example project, so the password is intentionally kept here
      POSTGRES_DB: db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

