
services:
  #--- Initialization ---
  #Container for certificate initialization
  # docker compose --profile init up certbot-init
  certbot-init:
    image: certbot/certbot
    container_name: certbot-init
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    profiles:
      - init
  #Proxy
  # docker compose --profile init up nginx-init
  nginx-init:
    image: nginx:latest
    container_name: nginx-init
    ports:
      - 80:80
      - 443:443 
    restart: unless-stopped
    volumes:
      - ./proxy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    profiles:
      - init
      - dev

  #--- Real configuration ---
  #Webserver
  server:
    container_name: artobium_web
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    ports:
      - 3000:8080
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - dev
      - prod
    #Proxy
  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - 80:80
      - 443:443 
    restart: unless-stopped
    volumes:
      - ./proxy/nginx/nginx-full.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    profiles:
      - prod
  #Certificates
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - prod
  #DB
  db:
    image: postgres:18
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret #This is an example project, so the password is intentionally kept here
      POSTGRES_DB: db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - prod

volumes:
  postgres_data:

